services:
  db:
    image: postgres:16-alpine
    container_name: nyx-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nyx_db}
    ports:
      - "4732:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-nyx_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nyx-network

  nyx-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nyx-backend
    restart: always
    ports:
      - "4701:3001"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-nyx_db}?schema=public
      - GH_TOKEN=${GH_TOKEN}
      - GH_WEBHOOK_SECRET=${GH_WEBHOOK_SECRET}
      - MAINTAINER_SECRET=${MAINTAINER_SECRET}
      - SHADE_AGENT_URL=http://shade-agent-app:3000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - nyx-network

  nyx-frontend:
    build:
      context: ./frontend/nyx-frontend
      dockerfile: Dockerfile
    container_name: nyx-frontend
    restart: always
    ports:
      - "4700:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost:4701}
    depends_on:
      - nyx-backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - nyx-network

  shade-agent-app:
    build:
      context: ./shadeagent/shade-agent-v2
      dockerfile: Dockerfile
    container_name: shade-agent-app
    restart: always
    ports:
      - "4783:3000"
    environment:
      - DEBUG=true
      - NETWORK_ID=testnet
      - AGENT_CONTRACT_ID=${AGENT_CONTRACT_ID}
      - SPONSOR_ACCOUNT_ID=${SPONSOR_ACCOUNT_ID}
      - SPONSOR_PRIVATE_KEY=${SPONSOR_PRIVATE_KEY}
      - GH_TOKEN=${GH_TOKEN}
      - GH_WEBHOOK_SECRET=${GH_WEBHOOK_SECRET}
      - AI_API_KEY=${AI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_KEY=${OPENAI_KEY}
      - MAINTAINER_SECRET=${MAINTAINER_SECRET}
      - BACKEND_URL=${BACKEND_URL:-http://nyx-backend:3001}
      - BACKEND_CALLBACK_URL=${BACKEND_CALLBACK_URL:-http://nyx-backend:3001/callback}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/agent-info"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - nyx-network

networks:
  nyx-network:
    driver: bridge

volumes:
  postgres_data:
